version: 2

models:
  - name: EMPLOYEE
    description: "employee_transforming"
    columns:
      - name: EMPID
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: ["1", "2", "3", "4", "5"]
                config:
                  severity: warn
      - name: SALARY
        data_tests:
          - salary_check
  - name: CUSTOMER
    description: "customer_table"
  - name: CUSTOMER_VIEW
    description: "customer_table"
  - name: SALES
    description: "sales_incremental"
  - name: PRODUCT
    description: 'product_table'
  - name: PURCHASE
    description: 'purchase_merged_table'
  - name: CLEAN_ORDERS
    description: 'EPHEMERAL_MODEL_order_table'
  - name: FINAL_ORDERS
    description: 'order_table_model' 


    
sources:
  - name: EMPLOYEE
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: EMPLOYEE_RAW
  - name: CUSTOMER
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: CUSTOMER_SRC
  - name: SALES
    database: DBT_DB
    schema: PUBLIC
    tables:
      - name: SALES_SRC
  - name: PRODUCT
    database: DBT_DB
    schema: PUBLIC
    tables: 
      - name: PRODUCT_SRC
  - name: PURCHASE
    database: DBT_DB
    schema: PUBLIC
    tables:
       - name: PURCHASE_SRC
  - name: CLEAN_ORDERS
    database: DBT_DB
    schema: PUBLIC
    tables:
       - name: BASE_ORDERS
  
